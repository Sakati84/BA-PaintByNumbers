<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>iPhone 13 Preview</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #171717;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .phone {
        width: 390px;
        height: 844px;
        padding: 16px;
        border-radius: 48px;
        background: #050505;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.55);
      }

      .screen {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
        border-radius: 34px;
        background: #fff;
      }

      .notch {
        position: absolute;
        top: 0;
        left: 50%;
        z-index: 2;
        width: 164px;
        height: 31px;
        transform: translateX(-50%);
        border-bottom-right-radius: 18px;
        border-bottom-left-radius: 18px;
        background: #050505;
      }

      iframe {
        width: 100%;
        height: 100%;
        border: 0;
      }
    </style>
  </head>
  <body>
    <div class="phone" aria-label="iPhone 13 viewport preview">
      <div class="screen">
        <div class="notch"></div>
        <iframe src="http://localhost:8081/" title="App preview"></iframe>
      </div>
    </div>
  </body>
</html>
