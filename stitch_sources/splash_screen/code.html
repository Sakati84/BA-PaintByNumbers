<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Coloring Canvas - Welcome</title>

                    "inverse-primary": "#93d3bc",
                    "secondary-container": "#b1dcff",

                    "on-secondary-fixed": "#001e2f",

                    "on-secondary": "#ffffff",

                    "primary-container": "#a7e8d0",
                    "secondary": "#386380",

                    "surface-variant": "#dde4e6",
                    "error-container": "#ffdad6",
                    "background": "#f4fafd",
                    "tertiary-container": "#e7dba4",
                    "surface-container": "#e8eff1",
                    "surface-container-high": "#e2e9ec",
                    "on-secondary-container": "#36627f",
                    "surface-container-low": "#eef5f7",
                    "on-tertiary": "#ffffff",
                    "on-primary-fixed": "#002118",
                    "primary": "#296956",
                    "on-surface": "#161d1f",
                    "on-error-container": "#93000a",
                    "inverse-on-surface": "#ebf2f4",
                    "on-tertiary-container": "#686033",
                    "secondary-fixed": "#c9e6ff",
                    "error": "#ba1a1a",
                    "on-tertiary-fixed-variant": "#4e471d",
                    "outline-variant": "#bfc9c3",
                    "tertiary-fixed": "#efe3ab",

            "spacing": {
                    "xs": "4px",
                    "xl": "64px",
                    "base": "8px",
                    "sm": "12px",
                    "md": "24px",
                    "lg": "48px",
                    "canvas-margin": "32px"
            },
            "fontFamily": {
                    "body-lg": [
                            "Plus Jakarta Sans"

                    "headline-md": [
                            "Spline Sans"

                    "body-md": [

                    ],
                    "headline-lg": [

                    "label-bold": [

            "fontSize": {

                    "label-bold": [

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-bright text-on-surface antialiased overflow-hidden selection:bg-primary-container selection:text-on-primary-container">
<!-- Splash Screen Container -->
<main class="min-h-screen w-full flex flex-col items-center justify-center relative px-canvas-margin">
<!-- Ambient Background Layers (Minimalist & Tactile Tonal Layers) -->
<div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute top-[-15%] left-[-10%] w-[60%] h-[60%] rounded-full bg-primary-container opacity-40 blur-[80px]"></div>
<div class="absolute bottom-[-10%] right-[-15%] w-[70%] h-[70%] rounded-full bg-secondary-fixed opacity-30 blur-[100px]"></div>
<div class="absolute top-[40%] left-[20%] w-[30%] h-[30%] rounded-full bg-tertiary-container opacity-20 blur-[60px]"></div>
</div>
<!-- Central Content Canvas (Level 1 Sheet) -->
<div class="relative z-10 flex flex-col items-center w-full max-w-md">
<!-- Illustration Area -->
<div class="w-64 h-64 sm:w-80 sm:h-80 mb-lg relative">
<!-- Tactile Frame -->
<div class="absolute inset-0 bg-surface-container-lowest rounded-[2rem] border border-surface-variant shadow-[0_12px_40px_-10px_rgba(41,105,86,0.1)] flex items-center justify-center p-sm">
<!-- Inner Canvas Area -->
<div class="w-full h-full rounded-[1.5rem] bg-surface-bright flex items-center justify-center overflow-hidden relative border border-outline-variant/30">
<div class="absolute inset-0 bg-grid-slate-100/[0.04] bg-[size:20px_20px]"></div>
<img alt="Pencil sketching a butterfly" class="w-[85%] h-[85%] object-contain relative z-10 drop-shadow-sm" data-alt="whimsical 2d animated style illustration of a yellow wooden pencil actively drawing a vibrant blooming pink flower and blue butterfly on textured white paper, soft pastel mint background, playful and encouraging mood" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBcRweVgg0upa7YlfTnrPMrhcgZIsgMaLFRnUyX6QiJ9fPUlssewuzhJGAw1XC9C2ufuL_ZG7UcN909cumoBtETgGNnHatS_2zL6rtuy8eWHmGvfh7AMl9QES_682QvztZvtbxNmNwItqpNWzKm1onivNnAfC9hU1Fd0SI_o6Q_xAw2fuGWTO0vaywmG30ATHMqOERnWpdQPB_Ql3qyGMCDlX4pgzxrqffurJqxoMbh5hct9jphGIHqgW9OwP0azabNUqLYRg4_2KRx"/>
</div>
</div>
</div>
<!-- Typography Branding -->
<div class="text-center mb-xl">
<h1 class="font-headline-lg text-headline-lg text-primary mb-xs">Coloring Canvas</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant/80">Your blank page awaits.</p>
</div>
<!-- Progress Indicator (Crayon-Trace Style) -->
<div class="w-48 sm:w-64 flex flex-col items-center relative">
<!-- The Pencil Icon 'Drawing' -->
<div class="absolute -top-7 left-[65%] -translate-x-1/2 text-primary drop-shadow-md z-20">
<span class="material-symbols-outlined text-[28px] rotate-[-45deg]" style="font-variation-settings: 'FILL' 1;">edit</span>
</div>
<!-- The Track -->
<div class="w-full h-4 bg-surface-container rounded-full overflow-hidden border border-outline-variant/20 shadow-inner relative z-10">
<!-- The Fill -->
<div class="h-full bg-inverse-primary rounded-full w-[65%] relative">
<div class="absolute inset-0 bg-gradient-to-r from-transparent to-white/30 rounded-full"></div>
</div>
</div>
<!-- Loading Text -->
<span class="font-label-bold text-label-bold text-on-surface-variant/60 mt-sm uppercase tracking-wider">Unpacking supplies...</span>
</div>
</div>
</main>
</body></html>
