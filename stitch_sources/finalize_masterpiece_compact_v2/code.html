<!-- BottomNavBar -->
<script>
    function selectCard(clickedCard, groupName) {
        // Find all cards in the same group
        const groupContainer = clickedCard.parentElement;
        const allCards = groupContainer.querySelectorAll('.tactile-card');

        // Reset all cards in the group
        allCards.forEach(card => {
            card.classList.remove('tactile-card-selected', 'bg-secondary-container', 'text-on-secondary-container');
            card.classList.add('bg-surface-container', 'text-on-surface-variant');
            
            // Remove checkmark if it exists
            const checkmark = card.querySelector('.absolute.top-1\\.5.right-1\\.5');
            if (checkmark) {
                checkmark.remove();
            }

            // Reset bottom bar for the card
            const bottomBar = card.querySelector('div.p-2');
            if(bottomBar) {
                bottomBar.classList.remove('bg-secondary-container', 'border-primary');
                bottomBar.classList.add('bg-surface-container', 'border-outline-variant');
            }
        });

        // Set the clicked card to selected
        clickedCard.classList.add('tactile-card-selected', 'bg-secondary-container', 'text-on-secondary-container');
        clickedCard.classList.remove('bg-surface-container', 'text-on-surface-variant');

        // Add checkmark
        const checkmarkHtml = `
            <div class="absolute top-1.5 right-1.5 bg-primary text-on-primary rounded-full p-0.5 flex items-center justify-center shadow-sm">
                <span class="material-symbols-outlined text-[14px]" style="font-variation-settings: 'FILL' 1;">check</span>
            </div>
        `;
        clickedCard.insertAdjacentHTML('beforeend', checkmarkHtml);

        // Update bottom bar for the selected card
        const bottomBar = clickedCard.querySelector('div.p-2');
        if(bottomBar) {
            bottomBar.classList.add('bg-secondary-container', 'border-primary');
            bottomBar.classList.remove('bg-surface-container', 'border-outline-variant');
        }
    }
</script>
